<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Trámite Fácil</title>
  <link href="css/tramite.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body>
  <!-- NAVBAR -->
  <header>
    <div class="container">
      <div class="logo">
        <a href="home.html">
          <img src="assets/logo.svg" alt="Logo Frontera Inteligente" class="logo-img" />
        </a>
      </div>
      <nav>
        <a href="perfil.html">Mi perfil</a>
        <a href="index.html" class="btn-registrarse">Cerrar Sesion</a>
      </nav>
    </div>
  </header>

  <!-- FORMULARIO DE TRÁMITE -->
  <section class="tramite-wrapper">
    <h2>Formulario de Trámite</h2>
    <p>Complete los datos requeridos para ingresar al sistema aduanero</p>

    <form class="tramite-grid" id="tramiteForm">
      <input type="text" placeholder="Nombre de la persona" required>
      <input type="text" placeholder="Tipo de vehículo" required>
      <input type="text" placeholder="¿Menor de edad?" required>
      <input type="text" placeholder="Producto a declarar" required>
      <input type="text" placeholder="¿Ingresará una mascota?" required>
      <input type="file" required>
      <input type="text" placeholder="Declaración SAG" required>
      <input type="text" placeholder="Pasaporte vigente" required>

      <div class="tramite-submit">
        <button type="submit">Enviar Trámite</button>
      </div>
    </form>
  </section>

  <script>
    document.getElementById("tramiteForm")?.addEventListener("submit", function (e) {
      e.preventDefault();
      alert("✅ Trámite recibido con éxito");
      this.reset();
    });
  </script>

  <footer class="gov-footer">
    <div class="footer-content">
      <div class="footer-col logo-col">
        <img src="assets/logo.svg" alt="Frontera Inteligente" class="logo-footer" />
      </div>
      <div class="footer-col links-col">
        <p><strong>Red de servicios</strong></p>
        <a href="#">Trámites disponibles</a>
        <a href="#">Puntos de control</a>
      </div>
      <div class="footer-col call-col">
        <p><strong><i class="fas fa-phone-alt"></i> Ayuda Telefónica</strong><br />600 123 4567</p>
      </div>
      <div class="footer-col contact-col">
        <p><strong><i class="fas fa-question-circle"></i> Consultas</strong><br /><a href="#">¡Contáctanos!</a></p>
        <div class="social-icons">
          <a href="#"><i class="fab fa-youtube"></i></a>
          <a href="#"><i class="fab fa-facebook"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
      <div class="footer-col gov-col">
        <img src="assets/logo-ministerio.png" alt="Ministerio" class="logo-gobierno" />
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
